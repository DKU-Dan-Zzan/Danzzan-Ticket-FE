name: Color Lint CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-colors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run color lint
        run: npm run lint:colors